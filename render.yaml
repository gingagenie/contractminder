services:
  - type: web
    name: contractminder-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JOBBER_CLIENT_ID
        sync: false
      - key: JOBBER_CLIENT_SECRET
        sync: false
      - key: JOBBER_REDIRECT_URI
        sync: false
      - key: JOBBER_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: contractminder-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
